name: church_mobile
description: A comprehensive church mobile application
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  permission_handler: ^12.0.0+1
  cupertino_icons: ^1.0.2
  uuid: ^4.2.1
  intl: ^0.20.2
  share_plus: ^11.0.0
  pdf: ^3.10.7
  universal_html: ^2.2.4
  
  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.6

  # Notifications
  awesome_notifications: ^0.11.0
  
  # UI Components
  card_swiper: ^3.0.1
  webview_flutter_android: ^4.7.0
  webview_flutter_platform_interface: ^2.6.0
  webview_flutter: ^4.9.0  # For PDF viewing
  shared_preferences: ^2.2.2  # For persistent storage
  flutter_native_splash: ^2.4.1
  table_calendar: ^3.0.9  # For Bible Reading Plan calendar
  flutter_local_notifications: ^17.1.2  # For reading reminders
  timezone: ^0.9.2  # For handling notification timezones
  
  # Audio player
  just_audio: ^0.10.3
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.12
  audio_session: ^0.2.2
  rxdart: ^0.28.0
  
  # Caching
  cached_network_image: ^3.3.1
  
  # Storage
  path_provider: ^2.1.2
  
  # UI
  flutter_slidable: ^4.0.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  device_calendar: ^4.3.2  # Downgrade to a more stable version
  package_info_plus: ^8.3.0  # Updated to latest version
  url_launcher: ^6.2.5
  provider: ^6.1.1
  flutter_cache_manager: ^3.3.1
  timeago: ^3.6.0
  youtube_player_iframe: ^5.2.1
  # flutter_pdfview: ^1.3.2  # Alternative PDF viewer
  # native_pdf_view: ^6.0.0+1  # More reliable PDF viewer
  # pdf_render: ^1.4.2  # Simple PDF renderer
  syncfusion_flutter_pdfviewer: ^33.2.13  # Native PDF viewer
  
  # Network
  http: ^1.2.0
  dio: ^5.4.1
  connectivity_plus: ^6.1.3  # Updated to resolve dependency conflict
  
  # Video Playback Dependencies
  video_player: ^2.11.1
  chewie: ^1.13.1
  firebase_messaging: ^15.2.10
  image_gallery_saver_plus: ^5.0.0
  youtube_explode_dart: ^3.1.0
  marquee: ^2.3.0
  carousel_slider: ^5.1.2
  image_picker: ^1.2.2

  # Bible AI Engine (ILLUMINE)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dart_openai: ^5.1.0
  google_generative_ai: ^0.4.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cloud_functions: ^5.6.2
  flutter_markdown: ^0.7.6

  # Pneuma AI
  go_router: ^14.6.2
  google_mobile_ads: ^5.3.0
  emoji_picker_flutter: ^4.4.0
  file_picker: ^11.0.2
  swipe_to: ^1.0.6
  flutter_quill: ^11.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  # Bible AI code generation
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

